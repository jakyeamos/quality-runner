name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        run: uv run --python ${{ matrix.python-version }} --with pytest pytest -q

      - name: Run Ruff lint
        run: uv run --python ${{ matrix.python-version }} --with ruff ruff check .

      - name: Run Ruff format check
        run: uv run --python ${{ matrix.python-version }} --with ruff ruff format --check .

      - name: Run BasedPyright
        run: uv run --python ${{ matrix.python-version }} --with basedpyright basedpyright

      - name: Run Vulture
        run: uv run --python ${{ matrix.python-version }} --with vulture vulture . --min-confidence 70

      - name: Build package
        run: uv build

      - name: Smoke installed console scripts
        run: |
          python -m venv /tmp/quality-runner-smoke
          /tmp/quality-runner-smoke/bin/python -m pip install --no-deps dist/*.whl
          /tmp/quality-runner-smoke/bin/quality-runner --version
          /tmp/quality-runner-smoke/bin/quality-runner doctor --json
          /tmp/quality-runner-smoke/bin/quality-runner-mcp --version
