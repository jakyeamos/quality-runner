name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-26]
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          cache-dependency-glob: uv.lock
          cache-suffix: py-${{ matrix.python-version }}

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install locked development environment
        run: uv sync --locked --all-groups --python ${{ matrix.python-version }}

      - name: Run tests
        run: uv run --locked pytest -q

      - name: Run Ruff lint
        run: uv run --locked ruff check .

      - name: Run Ruff format check
        run: uv run --locked ruff format --check .

      - name: Run BasedPyright
        run: uv run --locked basedpyright

      - name: Run Vulture
        run: uv run --locked vulture quality_runner quality_evidence_contract repo_quality_certifier tests scripts --min-confidence 70

      - name: Audit Python dependencies
        run: uv run --locked pip-audit

      - name: Build package
        run: uv build

      - name: Smoke installed console scripts
        run: |
          python -m venv /tmp/quality-runner-smoke
          /tmp/quality-runner-smoke/bin/python -m pip install --no-deps dist/*.whl
          /tmp/quality-runner-smoke/bin/quality-runner --version
          /tmp/quality-runner-smoke/bin/quality-runner doctor --json
          /tmp/quality-runner-smoke/bin/quality-runner release-smoke --json
          mkdir -p /tmp/quality-runner-review-smoke
          /tmp/quality-runner-smoke/bin/quality-runner review /tmp/quality-runner-review-smoke --mode blind --run-id review-default --json \
            | /tmp/quality-runner-smoke/bin/python -c "import json, sys; payload = json.load(sys.stdin); assert payload['schema'] == 'quality-runner-outcome-v0.2' and payload['journey'] == 'review' and payload['assessment'] == 'packet-ready', payload"
          /tmp/quality-runner-smoke/bin/quality-runner review /tmp/quality-runner-review-smoke --mode blind --run-id review-legacy --legacy-output --json \
            | /tmp/quality-runner-smoke/bin/python -c "import json, sys; payload = json.load(sys.stdin); assert payload['schema'] == 'quality-runner-review-result-v0.1' and 'outcome' not in payload and 'next_action' not in payload, payload"
          /tmp/quality-runner-smoke/bin/quality-runner-mcp --version
          printf '%s\n' '{"jsonrpc":"2.0","id":1,"method":"tools/list"}' \
            | /tmp/quality-runner-smoke/bin/quality-runner-mcp \
            | /tmp/quality-runner-smoke/bin/python -c "import json, sys; names = {tool['name'] for tool in json.load(sys.stdin)['result']['tools']}; assert {'quality_runner_audit_outcome', 'quality_runner_review_outcome', 'quality_runner_verify_outcome', 'quality_runner_runs_outcome'}.issubset(names), names"
          mkdir -p /tmp/quality-runner-mcp-review-smoke
          printf '%s\n' '{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"quality_runner_review_outcome","arguments":{"repo_root":"/tmp/quality-runner-mcp-review-smoke","mode":"blind","run_id":"mcp-review-default"}}}' \
            | /tmp/quality-runner-smoke/bin/quality-runner-mcp \
            | /tmp/quality-runner-smoke/bin/python -c "import json, sys; from pathlib import Path; response = json.load(sys.stdin); assert response['jsonrpc'] == '2.0' and response['id'] == 2 and 'error' not in response, response; result = response['result']; assert result['schema'] == 'quality-runner-mcp-result-v0.1' and result['isError'] is False, result; outcome = result['structuredContent']; assert outcome['schema'] == 'quality-runner-outcome-v0.2' and outcome['journey'] == 'review' and outcome['state'] == 'awaiting-evidence' and outcome['assessment'] == 'packet-ready', outcome; paths = outcome['writes']['artifact_paths']; assert {'review_execution_json', 'review_adapter_response_template_json'}.issubset(paths) and all(Path(path).is_file() for path in paths.values()), paths"
