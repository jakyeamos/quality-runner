name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/quality-runner/

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Require release tag on main
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          cache-dependency-glob: uv.lock

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.12"

      - name: Install locked development environment
        run: uv sync --locked --all-groups --python 3.12

      - name: Run release checks
        run: |
          uv run --locked pytest -q
          uv run --locked ruff check .
          uv run --locked ruff format --check .
          uv run --locked basedpyright
          uv run --locked vulture quality_runner quality_evidence_contract repo_quality_certifier tests scripts --min-confidence 70
          uv run --locked pip-audit

      - name: Build package
        run: uv build

      - name: Verify tag, wheel, runtime, plugin, and citation versions
        if: startsWith(github.ref, 'refs/tags/')
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          RELEASE_VERSION="${RELEASE_VERSION#v}"
          python - "$RELEASE_VERSION" <<'PY'
          import json
          import sys
          import zipfile
          from email.parser import BytesParser
          from pathlib import Path

          expected = sys.argv[1]
          wheel = next(Path("dist").glob("quality_runner-*.whl"))
          with zipfile.ZipFile(wheel) as archive:
              metadata_path = next(
                  name for name in archive.namelist() if name.endswith(".dist-info/METADATA")
              )
              metadata = BytesParser().parsebytes(archive.read(metadata_path))
              manifest = json.loads(archive.read("quality_runner/plugin/manifest.json"))
          citation = Path("CITATION.cff").read_text(encoding="utf-8")
          assert metadata["Version"] == expected, (metadata["Version"], expected)
          assert manifest["version"] == expected, (manifest["version"], expected)
          assert f'version: "{expected}"' in citation
          PY
          python -m venv .release-version-check
          .release-version-check/bin/python -m pip install --no-deps dist/*.whl
          test "$(.release-version-check/bin/quality-runner --version)" = "$RELEASE_VERSION"
          test "$(.release-version-check/bin/quality-runner-mcp --version)" = "$RELEASE_VERSION"
          .release-version-check/bin/quality-runner doctor --json
          .release-version-check/bin/quality-runner release-smoke --json
          mkdir -p /tmp/quality-runner-release-review-smoke
          .release-version-check/bin/quality-runner review /tmp/quality-runner-release-review-smoke --mode blind --run-id review-default --json \
            | .release-version-check/bin/python -c "import json, sys; payload = json.load(sys.stdin); assert payload['schema'] == 'quality-runner-outcome-v0.2' and payload['journey'] == 'review' and payload['assessment'] == 'packet-ready', payload"
          .release-version-check/bin/quality-runner review /tmp/quality-runner-release-review-smoke --mode blind --run-id review-legacy --legacy-output --json \
            | .release-version-check/bin/python -c "import json, sys; payload = json.load(sys.stdin); assert payload['schema'] == 'quality-runner-review-result-v0.1' and 'outcome' not in payload and 'next_action' not in payload, payload"
          printf '%s\n' '{"jsonrpc":"2.0","id":1,"method":"tools/list"}' \
            | .release-version-check/bin/quality-runner-mcp \
            | .release-version-check/bin/python -c "import json, sys; names = {tool['name'] for tool in json.load(sys.stdin)['result']['tools']}; assert {'quality_runner_audit_outcome', 'quality_runner_review_outcome', 'quality_runner_verify_outcome', 'quality_runner_runs_outcome'}.issubset(names), names"
          mkdir -p /tmp/quality-runner-release-mcp-review-smoke
          printf '%s\n' '{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"quality_runner_review_outcome","arguments":{"repo_root":"/tmp/quality-runner-release-mcp-review-smoke","mode":"blind","run_id":"mcp-review-default"}}}' \
            | .release-version-check/bin/quality-runner-mcp \
            | .release-version-check/bin/python -c "import json, sys; from pathlib import Path; response = json.load(sys.stdin); assert response['jsonrpc'] == '2.0' and response['id'] == 2 and 'error' not in response, response; result = response['result']; assert result['schema'] == 'quality-runner-mcp-result-v0.1' and result['isError'] is False, result; outcome = result['structuredContent']; assert outcome['schema'] == 'quality-runner-outcome-v0.2' and outcome['journey'] == 'review' and outcome['state'] == 'awaiting-evidence' and outcome['assessment'] == 'packet-ready', outcome; paths = outcome['writes']['artifact_paths']; assert {'review_execution_json', 'review_adapter_response_template_json'}.issubset(paths) and all(Path(path).is_file() for path in paths.values()), paths"

      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/')
        uses: pypa/gh-action-pypi-publish@release/v1
